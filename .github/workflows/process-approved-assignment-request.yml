name: Process Approved Assignment Request

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Mark as processing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("pending");
            await removeIfPresent("failed");
            if (!issue.labels.map((l) => l.name).includes("processing")) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["processing"],
              });
            }

      - name: Validate issue body
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const repoMatch = body.match(/repository[\s\S]*?\n\s*([^\n]+)/i);
            const templateMatch = body.match(/template[_ ]?key[\s\S]*?\n\s*([^\n]+)/i);
            const repository = repoMatch ? repoMatch[1].trim() : "";
            const templateKey = templateMatch ? templateMatch[1].trim() : "";
            const valid = Boolean(repository) && Boolean(templateKey);
            core.setOutput("valid", valid ? "true" : "false");
            core.setOutput("repository", repository);
            core.setOutput("template_key", templateKey);

      - name: Dry-run provisioning placeholder
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        env:
          DRY_RUN: "true"
        with:
          script: |
            const isDryRun = process.env.DRY_RUN === "true";
            const body = isDryRun
              ? "Dry run: assignment request validated. Configure registry checks and provisioning next."
              : "Assignment request automation executed.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

      - name: Mark as processed
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("processing");
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["processed"],
            });

      - name: Mark as failed if validation failed
        if: steps.validate.outputs.valid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("processing");
            await removeIfPresent("pending");
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["failed"],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "Validation failed: repository and template_key are required.",
            });
