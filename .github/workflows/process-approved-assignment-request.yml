name: Process Approved Assignment Request

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  process:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'approve' &&
      contains(github.event.issue.labels.*.name, 'assignment-request') &&
      !contains(github.event.issue.labels.*.name, 'processed')
    runs-on: ubuntu-latest
    steps:
      - name: Mark as processing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('failed');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processing'],
            });

      - name: Guard student registry read secret
        uses: actions/github-script@v7
        env:
          READ_TOKEN: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
        with:
          script: |
            if (process.env.READ_TOKEN) {
              return;
            }

            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Automation configuration error: missing STUDENT_REGISTRY_READ_TOKEN.',
            });

            core.setFailed('Missing required secret: STUDENT_REGISTRY_READ_TOKEN');

      - name: Parse assignment request fields
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const lines = body.split(/\r?\n/);

            const extractHeadingValue = (headingRegex) => {
              for (let i = 0; i < lines.length; i++) {
                if (!headingRegex.test(lines[i].trim())) continue;
                for (let j = i + 1; j < lines.length; j++) {
                  const candidate = lines[j].trim();
                  if (candidate === '' || candidate.startsWith('<!--')) continue;
                  if (/^#{1,6}\s/.test(candidate)) break;
                  return candidate;
                }
              }
              return '';
            };

            const organization = extractHeadingValue(/^#{1,6}\s*organization\b/i);
            const repository = extractHeadingValue(/^#{1,6}\s*repository(?:\s+name)?\b/i);
            const normalizeRepository = (value) => String(value || '').trim();
            const buildTemplateRepository = (repository) =>
              repository.endsWith('-') ? `${repository}startercode` : `${repository}-startercode`;

            const normalizedRepository = normalizeRepository(repository);
            const templateRepository = buildTemplateRepository(normalizedRepository);

            core.setOutput('organization', organization);
            core.setOutput('repository', normalizedRepository);
            core.setOutput('template_repository', templateRepository);

            if (organization && normalizedRepository) {
              return;
            }

            const missing = [];
            if (!organization) missing.push('Organization');
            if (!normalizedRepository) missing.push('Repository name');

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await removeIfPresent('pending');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Validation failed: missing required field(s): ${missing.join(', ')}.`,
            });

            core.setFailed(`Missing required fields: ${missing.join(', ')}`);

      - name: Check identity in student registry first
        id: identity
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const requester = (issue.user.login || '').toLowerCase();

            const contentResponse = await github.rest.repos.getContent({
              owner: 'zuyd-courses',
              repo: 'student-registry',
              path: 'data/students.json',
            });
            const payload = Array.isArray(contentResponse.data) ? contentResponse.data[0] : contentResponse.data;
            const content = Buffer.from(payload.content, payload.encoding).toString('utf8');
            const registry = JSON.parse(content);
            const students = Array.isArray(registry.students) ? registry.students : [];

            const known = students.some((student) => {
              const logins = [
                ...(Array.isArray(student.github_logins) ? student.github_logins : []),
                ...(student.github_login ? [student.github_login] : []),
              ]
                .map((value) => String(value || '').trim().toLowerCase())
                .filter(Boolean);
              return logins.includes(requester);
            });

            core.setOutput('known_student', known ? 'true' : 'false');

            if (known) {
              return;
            }

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await removeIfPresent('pending');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Assignment request blocked: your GitHub account is not registered in student-registry yet. Submit the access request flow first, then try again.',
            });

            core.setFailed('Requester not found in student-registry.');

      - name: Validate organization, template, and repository
        if: steps.identity.outputs.known_student == 'true'
        id: target
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const organization = '${{ steps.parse.outputs.organization }}'.trim();
            const repository = '${{ steps.parse.outputs.repository }}'.trim();
            const templateRepository = '${{ steps.parse.outputs.template_repository }}'.trim();

            // Verify organization + template repository first, then ensure target repo does not already exist.
            try {
              await github.rest.repos.get({
                owner: organization,
                repo: templateRepository,
              });
            } catch (error) {
              if (error.status === 404) {
                const removeIfPresent = async (name) => {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      name,
                    });
                  } catch (removeError) {
                    if (removeError.status !== 404) throw removeError;
                  }
                };

                await removeIfPresent('processing');
                await removeIfPresent('pending');
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['failed'],
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Validation failed: derived template repository ${organization}/${templateRepository} was not found or is not visible to automation.`,
                });
                core.setFailed('Template repository not found.');
                return;
              }
              throw error;
            }

            let repoExists = false;
            try {
              await github.rest.repos.get({
                owner: organization,
                repo: repository,
              });
              repoExists = true;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (repoExists) {
              const removeIfPresent = async (name) => {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name,
                  });
                } catch (removeError) {
                  if (removeError.status !== 404) throw removeError;
                }
              };

              await removeIfPresent('processing');
              await removeIfPresent('pending');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['failed'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Validation failed: target repository ${organization}/${repository} already exists.`,
              });

              core.setFailed('Target repository already exists.');
              return;
            }

            core.setOutput('organization', organization);
            core.setOutput('repository', repository);
            core.setOutput('template_repository', templateRepository);

      - name: Comment validation result
        if: steps.identity.outputs.known_student == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const organization = '${{ steps.target.outputs.organization }}';
            const repository = '${{ steps.target.outputs.repository }}';
            const templateRepository = '${{ steps.target.outputs.template_repository }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Assignment request validated for registered student.\n\nValidated target:\n- org: ${organization}\n- repo: ${repository}\n- derived template: ${templateRepository}\n\nNext step: connect provisioning (create from template + assign access).`,
            });

      - name: Mark as processed
        if: steps.identity.outputs.known_student == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await removeIfPresent('pending');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processed'],
            });
