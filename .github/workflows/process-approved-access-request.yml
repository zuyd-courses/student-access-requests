name: Process Approved Access Request

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  process:
    if: >-
      github.event.label.name == 'approve' &&
      contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - name: Load access codes from student-registry
        id: load_access_codes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
          script: |
            const response = await github.rest.repos.getContent({
              owner: 'zuyd-courses',
              repo: 'student-registry',
              path: 'config/access-codes.json',
            });

            const payload = Array.isArray(response.data) ? response.data[0] : response.data;
            const content = Buffer.from(payload.content, payload.encoding).toString('utf8');
            const parsed = JSON.parse(content);
            core.setOutput('access_codes_json', JSON.stringify(parsed.course_access_codes || {}));

      - name: Mark as processing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("pending");
            await removeIfPresent("failed");
            if (!issue.labels.map((l) => l.name).includes("processing")) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["processing"],
              });
            }

      - name: Validate issue body
        id: validate
        uses: actions/github-script@v7
        env:
          ACCESS_CODES_JSON: ${{ steps.load_access_codes.outputs.access_codes_json }}
        with:
          script: |
            const body = context.payload.issue.body || "";
            const accessCodeMatch = body.match(/access[_ ]?code[\s\S]*?\n\s*([^\n]+)/i);
            const accessCode = accessCodeMatch ? accessCodeMatch[1].trim() : "";
            const accessCodes = JSON.parse(process.env.ACCESS_CODES_JSON || '{}');
            const valid = Boolean(accessCode) && Object.values(accessCodes).includes(accessCode);
            core.setOutput("valid", valid ? "true" : "false");
            core.setOutput("access_code", accessCode);

      - name: Dry-run processing placeholder
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        env:
          DRY_RUN: "true"
        with:
          script: |
            const isDryRun = process.env.DRY_RUN === "true";
            const note = isDryRun
              ? "Dry run: access request validated. Configure invite automation next."
              : "Access request automation executed.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: note,
            });

      - name: Mark as processed
        if: steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("processing");
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["processed"],
            });

      - name: Mark as failed if validation failed
        if: steps.validate.outputs.valid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            };

            await removeIfPresent("processing");
            await removeIfPresent("pending");
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["failed"],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "Validation failed: access_code is required.",
            });
