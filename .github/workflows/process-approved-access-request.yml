name: Process Approved Access Request

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  process:
    if: >-
      github.event.label.name == 'approve' &&
      contains(github.event.issue.labels.*.name, 'access-request') &&
      contains(github.event.issue.labels.*.name, 'validated')
    runs-on: ubuntu-latest
    steps:
      - name: Confirm validation before approval
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Access request approved. Next step is to invite the student into the onboarding flow.',
            });
