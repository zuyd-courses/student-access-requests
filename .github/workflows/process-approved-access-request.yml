name: Process Approved Access Request

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  process:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'approve' &&
      contains(github.event.issue.labels.*.name, 'access-request') &&
      contains(github.event.issue.labels.*.name, 'validated') &&
      !contains(github.event.issue.labels.*.name, 'processed')
    runs-on: ubuntu-latest
    steps:
      - name: Mark as processing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('failed');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processing'],
            });

      - name: Approval acknowledgement
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Access request approved. Next step is to invite the student into the onboarding flow.',
            });

      - name: Mark as processed
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processed'],
            });
