name: Process Approved Access Request

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  process:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'approve' &&
      contains(github.event.issue.labels.*.name, 'access-request') &&
      contains(github.event.issue.labels.*.name, 'validated') &&
      !contains(github.event.issue.labels.*.name, 'processed')
    runs-on: ubuntu-latest
    steps:
      - name: Mark as processing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('failed');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processing'],
            });

      - name: Invite requester to student-intake
        id: invite
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STUDENT_INTAKE_INVITE_TOKEN }}
          script: |
            const username = context.payload.issue.user.login;
            const response = await github.rest.repos.addCollaborator({
              owner: 'zuyd-courses',
              repo: 'student-intake',
              username,
              permission: 'pull',
            });

            core.setOutput('status', String(response.status));

      - name: Approval acknowledgement
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.invite.outputs.status }}';
            const inviteNote = status === '201'
              ? 'You have been invited to the private intake repository.'
              : 'You already have access to the private intake repository.';
            const intakeLink = 'https://github.com/zuyd-courses/student-intake/issues/new?template=profile-intake.yml';
            const intakeHome = 'https://github.com/zuyd-courses/student-intake';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Access request approved. ${inviteNote}\n\nNext step:\n1. Accept the invitation from your email or GitHub notifications.\n2. After accepting, return to this comment and open the intake form link below.\n3. Submit your profile details (first name, last name, classroom, zuyd email).\n\nIntake form: ${intakeLink}\nIntake repo homepage (backup): ${intakeHome}`,
            });

      - name: Mark as processed
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('processing');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processed'],
            });
