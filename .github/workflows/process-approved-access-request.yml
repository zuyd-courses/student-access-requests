name: Process Approved Access Request

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Access request issue number
        required: true
        type: string

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm validation before approval
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number('${{ inputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: 'Access request approved. Next step is to invite the student into the onboarding flow.',
            });
