name: Process Validated Access Requests

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Process all open validated access requests
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COURSE_AUTOMATION_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const intakeRepo = 'student-intake';
            const intakeLink = `https://github.com/${owner}/${intakeRepo}/issues/new?template=profile-intake.yml`;
            const intakeHome = `https://github.com/${owner}/${intakeRepo}`;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'access-request,validated',
              per_page: 100,
            });

            const targets = issues.filter((issue) => {
              const labels = issue.labels.map((l) => l.name);
              return labels.includes('access-request') && labels.includes('validated') && !labels.includes('processed');
            });

            if (targets.length === 0) {
              core.notice('No open validated access-request issues found.');
              return;
            }

            for (const issue of targets) {
              const issueNumber = issue.number;
              const username = issue.user.login;
              const currentLabels = new Set(issue.labels.map((label) => label.name));

              const removeIfPresent = async (name) => {
                if (!currentLabels.has(name)) {
                  return;
                }

                await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name });
                currentLabels.delete(name);
              };

              const addLabels = async (labels) => {
                const nextLabels = labels.filter((label) => !currentLabels.has(label));
                if (nextLabels.length === 0) {
                  return;
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: nextLabels,
                });

                for (const label of nextLabels) {
                  currentLabels.add(label);
                }
              };

              await removeIfPresent('pending');
              await removeIfPresent('failed');
              await addLabels(['approved']);

              let status;
              try {
                const response = await github.rest.repos.addCollaborator({
                  owner,
                  repo: intakeRepo,
                  username,
                  permission: 'pull',
                });
                status = String(response.status);
              } catch (error) {
                await addLabels(['failed']);
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `Access request processing failed for @${username}: ${error.message}`,
                });
                continue;
              }

              const inviteNote = status === '201'
                ? 'You have been invited to the private intake repository.'
                : 'You already have access to the private intake repository.';

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `Access request approved. ${inviteNote}\n\nNext step:\n1. Accept the invitation from GitHub.\n2. Open the intake form link below.\n3. Submit your profile details (first name, last name, classroom, zuyd email).\n\nIntake form: ${intakeLink}`,
              });

              await removeIfPresent('validated');
              await removeIfPresent('approved');
              await addLabels(['processed']);

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                headers: {
                  'X-GitHub-Api-Version': '2026-03-10',
                },
                state: 'closed',
              });
            }

