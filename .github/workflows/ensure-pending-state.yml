name: Ensure Pending State

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  ensure-pending:
    if: >-
      contains(github.event.issue.labels.*.name, 'access-request') ||
      contains(github.event.issue.labels.*.name, 'assignment-request')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure pending label exists on new request
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map((l) => l.name);
            const states = ["pending", "processing", "processed", "failed"];
            const hasState = states.some((state) => labels.includes(state));
            if (!hasState) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["pending"],
              });
            }
