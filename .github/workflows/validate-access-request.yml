name: Validate Access Request

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  validate:
    if: >-
      github.event.sender.login != 'github-actions[bot]' &&
      contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - name: Guard required secrets
        uses: actions/github-script@v7
        env:
          READ_TOKEN: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
          REVIEWER_HANDLE: ${{ secrets.ACCESS_REQUEST_REVIEWER_HANDLE }}
        with:
          script: |
            const issue = context.payload.issue;
            const missing = [];
            if (!process.env.READ_TOKEN) missing.push('STUDENT_REGISTRY_READ_TOKEN');
            if (!process.env.REVIEWER_HANDLE) missing.push('ACCESS_REQUEST_REVIEWER_HANDLE');

            if (missing.length === 0) {
              return;
            }

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('pending');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Automation configuration error: missing secret(s) ${missing.join(', ')}. Staff must fix repository secrets before this request can be validated.`,
            });

            core.setFailed(`Missing required secret(s): ${missing.join(', ')}`);

      - name: Load access codes from student-registry
        id: load_access_codes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STUDENT_REGISTRY_READ_TOKEN }}
          script: |
            const response = await github.rest.repos.getContent({
              owner: 'zuyd-courses',
              repo: 'student-registry',
              path: 'config/access-codes.json',
            });

            const payload = Array.isArray(response.data) ? response.data[0] : response.data;
            const content = Buffer.from(payload.content, payload.encoding).toString('utf8');
            const parsed = JSON.parse(content);
            core.setOutput('access_codes_json', JSON.stringify(parsed.course_access_codes || {}));

      - name: Validate and redact access request
        uses: actions/github-script@v7
        env:
          ACCESS_CODES_JSON: ${{ steps.load_access_codes.outputs.access_codes_json }}
          REVIEWER_HANDLE: ${{ secrets.ACCESS_REQUEST_REVIEWER_HANDLE }}
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const accessCodes = JSON.parse(process.env.ACCESS_CODES_JSON || '{}');
            const normalizeCode = (value) =>
              String(value || '')
                .normalize('NFKC')
                .replace(/[\u200B-\u200D\uFEFF]/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();

            const lines = body.split(/\r?\n/);
            let accessCode = '';
            let sawHeading = false;

            for (let index = 0; index < lines.length; index++) {
              const line = lines[index].trim();
              if (/^#{1,6}\s*access code\b/i.test(line)) {
                sawHeading = true;
                for (let inner = index + 1; inner < lines.length; inner++) {
                  const candidate = lines[inner].trim();
                  if (candidate === '' || candidate.startsWith('<!--')) {
                    continue;
                  }
                  if (/^#{1,6}\s/.test(candidate)) {
                    break;
                  }
                  accessCode = candidate;
                  break;
                }
                break;
              }
            }

            const normalizedInput = normalizeCode(accessCode);
            const validCodes = Object.values(accessCodes).map((value) => normalizeCode(value));
            const valid = Boolean(normalizedInput) && validCodes.includes(normalizedInput);
            const redactedBody = accessCode ? body.replaceAll(accessCode, 'REDACTED') : body;

            if (redactedBody !== body) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: redactedBody,
              });
            }

            const hasValidatedLabel = issue.labels.some((label) => label.name === 'validated');

            const removeLabels = async (labels) => {
              for (const name of labels) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            };

            if (!valid) {
              await removeLabels(['pending', 'validated']);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['failed'],
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Access code is not valid. The issue is closed. Edit the code from REDACTED to the correct value and reopen the issue to try again.',
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });

              return;
            }

            await removeLabels(['pending', 'failed']);
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['validated'],
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            if (!hasValidatedLabel) {
              const reviewerHandle = (process.env.REVIEWER_HANDLE || '').trim();
              const reviewerMention = reviewerHandle ? `@${reviewerHandle}` : 'reviewer';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `${reviewerMention} the access code is valid. Please add the approve label when ready.`,
              });
            }