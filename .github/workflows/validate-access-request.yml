name: Validate Access Request

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  validate-access:
    if: >-
      github.event.sender.login != 'github-actions[bot]' &&
      contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - name: Parse access request metadata
        id: meta
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const hasValidatedLabel = issue.labels.some((label) => label.name === 'validated');
            core.setOutput('has_validated_label', hasValidatedLabel ? 'true' : 'false');

      - name: Validate access code
        id: codecheck
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COURSE_AUTOMATION_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const normalizeCode = (value) =>
              String(value || '')
                .normalize('NFKC')
                .replace(/[\u200B-\u200D\uFEFF]/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();

            const lines = body.split(/\r?\n/);
            let accessCode = '';

            for (let index = 0; index < lines.length; index++) {
              const line = lines[index].trim();
              if (/^#{1,6}\s*access code\b/i.test(line)) {
                for (let inner = index + 1; inner < lines.length; inner++) {
                  const candidate = lines[inner].trim();
                  if (candidate === '' || candidate.startsWith('<!--')) {
                    continue;
                  }
                  if (/^#{1,6}\s/.test(candidate)) {
                    break;
                  }
                  accessCode = candidate;
                  break;
                }
                break;
              }
            }

            const response = await github.rest.repos.getContent({
              owner: 'zuyd-courses',
              repo: 'student-registry',
              path: 'config/access-codes.json',
            });

            const payload = Array.isArray(response.data) ? response.data[0] : response.data;
            const content = Buffer.from(payload.content, payload.encoding).toString('utf8');
            const parsed = JSON.parse(content);
            const accessCodes = parsed.course_access_codes || {};

            const normalizedInput = normalizeCode(accessCode);
            const validCodes = Object.values(accessCodes).map((value) => normalizeCode(value));
            const valid = Boolean(normalizedInput) && validCodes.includes(normalizedInput);
            core.setOutput('valid', valid ? 'true' : 'false');

      - name: Redact access code in issue body
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const lines = body.split(/\r?\n/);
            let accessCode = '';

            for (let index = 0; index < lines.length; index++) {
              const line = lines[index].trim();
              if (/^#{1,6}\s*access code\b/i.test(line)) {
                for (let inner = index + 1; inner < lines.length; inner++) {
                  const candidate = lines[inner].trim();
                  if (candidate === '' || candidate.startsWith('<!--')) {
                    continue;
                  }
                  if (/^#{1,6}\s/.test(candidate)) {
                    break;
                  }
                  accessCode = candidate;
                  break;
                }
                break;
              }
            }

            const redactedBody = accessCode ? body.replaceAll(accessCode, 'REDACTED') : body;
            if (redactedBody === body) {
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              headers: {
                'X-GitHub-Api-Version': '2026-03-10',
              },
              body: redactedBody,
            });

      - name: Handle invalid access request
        if: steps.codecheck.outputs.valid != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['failed'],
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Access code is not valid. The issue is closed. Submit a new access request issue with the correct access code to retry.',
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              headers: {
                'X-GitHub-Api-Version': '2026-03-10',
              },
              state: 'closed',
            });

      - name: Mark valid access request as validated
        if: steps.codecheck.outputs.valid == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'pending',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['validated'],
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

      - name: Notify student about validated request
        if: steps.codecheck.outputs.valid == 'true' && steps.meta.outputs.has_validated_label != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Your submitted access code is valid. Your request is now waiting for instructor approval. You do not need to take any action right now.',
            });


  validate-assignment:
    if: >-
      github.event.sender.login != 'github-actions[bot]' &&
      (
        contains(github.event.issue.labels.*.name, 'assignment-request') ||
        contains(github.event.issue.body, '### Organization')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Mark assignment as processing
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('failed');
            await removeIfPresent('processed');
            await removeIfPresent('validated');
            await removeIfPresent('pending');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processing'],
            });

      - name: Parse assignment request fields
        id: parse
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const lines = body.split(/\r?\n/);

            const extractHeadingValue = (headingRegex) => {
              for (let i = 0; i < lines.length; i++) {
                if (!headingRegex.test(lines[i].trim())) continue;
                for (let j = i + 1; j < lines.length; j++) {
                  const candidate = lines[j].trim();
                  if (candidate === '' || candidate.startsWith('<!--')) continue;
                  if (/^#{1,6}\s/.test(candidate)) break;
                  return candidate;
                }
              }
              return '';
            };

            const organization = extractHeadingValue(/^#{1,6}\s*organization\b/i);
            const repository = extractHeadingValue(/^#{1,6}\s*repository(?:\s+name)?\b/i);
            const org = organization.trim();
            const repoPrefix = repository.trim();
            core.setOutput('organization', org);
            core.setOutput('repo_prefix', repoPrefix);

            if (org && repoPrefix) {
              return;
            }

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('pending');
            await removeIfPresent('processing');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Assignment request failed: Organization and Repository name are required. Submit a new assignment request issue to retry.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              headers: {
                'X-GitHub-Api-Version': '2026-03-10',
              },
              state: 'closed',
            });

            core.setFailed('Missing required assignment fields.');

      - name: Check student identity first
        id: identity
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COURSE_AUTOMATION_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const requester = (issue.user.login || '').toLowerCase();

            const contentResponse = await github.rest.repos.getContent({
              owner: 'zuyd-courses',
              repo: 'student-registry',
              path: 'data/students.json',
            });
            const payload = Array.isArray(contentResponse.data) ? contentResponse.data[0] : contentResponse.data;
            const content = Buffer.from(payload.content, payload.encoding).toString('utf8');
            const registry = JSON.parse(content);
            const students = Array.isArray(registry.students) ? registry.students : [];

            const known = students.some((student) => {
              const logins = [
                ...(Array.isArray(student.github_logins) ? student.github_logins : []),
                ...(student.github_login ? [student.github_login] : []),
              ]
                .map((value) => String(value || '').trim().toLowerCase())
                .filter(Boolean);
              return logins.includes(requester);
            });

            if (known) {
              return;
            }

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('pending');
            await removeIfPresent('processing');
            await removeIfPresent('failed');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['failed'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Assignment request failed: your GitHub account is not in student-registry yet. Request initial access first, then submit a new assignment request issue to retry.',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              headers: {
                'X-GitHub-Api-Version': '2026-03-10',
              },
              state: 'closed',
            });

            core.setFailed('Requester not found in student-registry.');

      - name: Validate org/template and create repository
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COURSE_AUTOMATION_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const requester = issue.user.login;
            const organization = '${{ steps.parse.outputs.organization }}'.trim();
            const repoPrefix = '${{ steps.parse.outputs.repo_prefix }}'.trim();
            const normalizedLogin = requester.toLowerCase();
            const prefixBase = repoPrefix.replace(/-+$/g, '');

            if (!prefixBase) {
              await failBroad();
              core.setFailed('Repository prefix is empty after normalization.');
              return;
            }

            const templateRepository = `${prefixBase}-startercode`;
            const targetRepository = `${prefixBase}-${normalizedLogin}`;

            const failBroad = async () => {
              const removeIfPresent = async (name) => {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              };

              await removeIfPresent('pending');
              await removeIfPresent('processing');
              await removeIfPresent('validated');
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['failed'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Assignment request failed: organization or repository prefix is not valid. Submit a new assignment request issue to retry.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                headers: {
                  'X-GitHub-Api-Version': '2026-03-10',
                },
                state: 'closed',
              });
            };

            try {
              await github.rest.repos.get({ owner: organization, repo: templateRepository });
            } catch (error) {
              if (error.status === 404) {
                await failBroad();
                core.setFailed('Template repository not found.');
                return;
              }
              throw error;
            }

            try {
              await github.rest.repos.get({ owner: organization, repo: targetRepository });
              await failBroad();
              core.setFailed('Target repository already exists.');
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            let created;
            try {
              created = await github.rest.repos.createUsingTemplate({
                template_owner: organization,
                template_repo: templateRepository,
                owner: organization,
                name: targetRepository,
                private: true,
                include_all_branches: false,
              });

              await github.rest.repos.addCollaborator({
                owner: organization,
                repo: targetRepository,
                username: requester,
                permission: 'maintain',
              });
            } catch (error) {
              await failBroad();
              core.setFailed(`Assignment provisioning failed: ${error.message}`);
              return;
            }

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('pending');
            await removeIfPresent('processing');
            await removeIfPresent('failed');
            await removeIfPresent('validated');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['processed'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Assignment repository created and access granted.\n\n- org: ${organization}\n- template: ${templateRepository}\n- repository: ${targetRepository}\n- access: maintain\n\nRepository URL: ${created.data.html_url}`,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              headers: {
                'X-GitHub-Api-Version': '2026-03-10',
              },
              state: 'closed',
            });