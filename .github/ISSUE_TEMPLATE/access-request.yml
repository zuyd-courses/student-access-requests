name: Access request form
description: Request first-time access to the course GitHub realm.
title: "Access request"
labels:
  - access-request
  - pending
body:
  - type: markdown
    attributes:
      value: Submit this form to request access.

  - type: input
    id: access_code
    attributes:
      label: Access code
      description: Access code provided in course materials.
      placeholder: COURSE ACCESS 1234
    validations:
      required: true

  - type: input
    id: course_code
    attributes:
      label: Course code optional
      description: Optional course identifier.
      placeholder: INF1A 2026
    validations:
      required: false
