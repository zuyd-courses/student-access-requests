name: Assignment request form
description: Request assignment repository provisioning.
title: "Assignment request"
labels:
  - assignment-request
  - pending
body:
  - type: markdown
    attributes:
      value: Submit this form to request assignment repository provisioning.

  - type: input
    id: organization
    attributes:
      label: Organization
      description: Organization where the assignment repository should exist.
      placeholder: mia-mmt1-2627
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository name
      description: Requested repository name or prefix.
      placeholder: final-
    validations:
      required: true

  - type: input
    id: course_code
    attributes:
      label: Course code optional
      description: Optional course identifier.
      placeholder: INF1A 2026
    validations:
      required: false

  - type: input
    id: template_repository
    attributes:
      label: Template repository
      description: Existing template repository used for provisioning.
      placeholder: final-startercode
    validations:
      required: true
