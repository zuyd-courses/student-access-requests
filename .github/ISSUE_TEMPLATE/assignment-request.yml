name: Assignment request form
description: Request assignment repository provisioning.
title: "Assignment request"
labels:
  - assignment-request
  - pending
body:
  - type: markdown
    attributes:
      value: Submit this form to request assignment repository provisioning.

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Requested repository in org/prefix format.
      placeholder: zuyd-courses/web101-team-07
    validations:
      required: true

  - type: input
    id: template_key
    attributes:
      label: Template key
      description: Assignment template identifier used for provisioning.
      placeholder: web101-assignment-1
    validations:
      required: true
